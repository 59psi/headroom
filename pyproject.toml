[project]
name = "headroom"
version = "0.1.0"
description = "Headroom web API"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "sqlalchemy[asyncio]",
    "aiosqlite",
    "pydantic-settings",
    "python-multipart",
    "Pillow",
    "pillow-heif",
    "colorthief",
    "webcolors",
]

[dependency-groups]
dev = [
    "pytest",
    "anyio[trio]",
    "pytest-anyio",
    "httpx",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/headroom"]

[tool.pytest.ini_options]
testpaths = ["tests"]
