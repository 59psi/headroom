services:
  headroom:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Stamp the footer with a build id:
        #   HEADROOM_BUILD_SHA=$(git rev-parse --short HEAD) docker compose up --build -d
        HEADROOM_BUILD_SHA: ${HEADROOM_BUILD_SHA:-}
    image: headroom:latest
    container_name: headroom
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - headroom-data:/data
    environment:
      # Provide your Anthropic key here OR via the Settings UI (DB takes precedence).
      # HEADROOM_ANTHROPIC_API_KEY: "sk-ant-..."
      # Optional: Google Cloud Vision key for fallback brand detection when
      # Claude is unavailable (colors always fall back locally, no key needed).
      # HEADROOM_GOOGLE_VISION_API_KEY: "AIzaSy..."
      HEADROOM_REMBG_MODEL: "u2netp"
      HEADROOM_CORS_ORIGINS: '["http://localhost:8000"]'
      # Optional: set this to require Bearer auth on /api/settings/api-key
      # endpoints. Leave unset for the open single-user-on-LAN default.
      # HEADROOM_ADMIN_TOKEN: "change-me-to-something-long"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health/ready', timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  headroom-data:
