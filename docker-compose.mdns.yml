# mDNS overlay — makes http://headroom.local:8000 resolve on your LAN.
#
# Multicast (which mDNS rides on) never crosses Docker's default bridge
# network, so the container must share the host's network stack. Host
# networking is Linux/Pi only — on macOS, Docker runs in a VM and this
# overlay won't reach the LAN (run the app bare-metal there instead; the
# app advertises mDNS natively).
#
#   docker compose -f docker-compose.yml -f docker-compose.mdns.yml up -d --build
#
# With host networking the `ports:` mapping is meaningless (hence the
# !reset) — the app binds 0.0.0.0:8000 directly on the host.
services:
  headroom:
    network_mode: host
    ports: !reset []
